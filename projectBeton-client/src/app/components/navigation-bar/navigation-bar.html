<button
  class="menu-toggle"
  type="button"
  aria-label="Открыть меню"
  aria-controls="site-navigation"
  [attr.aria-expanded]="isMenuOpen()"
  (click)="toggleMenu()"
>
  ☰
</button>
<nav id="site-navigation" class="main-nav" [class.is-open]="isMenuOpen()" aria-label="Основная навигация">
  <ul>
    <li><a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Главная</a></li>
    <li class="nav-dropdown" [class.is-open]="isPriceMenuOpen()">
      <button
        class="dropdown-toggle"
        type="button"
        aria-haspopup="true"
        aria-controls="prices-submenu"
        (click)="togglePriceMenu()"
        [attr.aria-expanded]="isPriceMenuOpen()"
        [class.active-link]="isPriceSectionActive()"
      >
        Цены
      </button>
      <ul id="prices-submenu" class="dropdown-menu">
        <li><a routerLink="/price" routerLinkActive="active-link" (click)="closeMenu()">Прайс</a></li>
        <li><a routerLink="/services" routerLinkActive="active-link" (click)="closeMenu()">Услуги</a></li>
      </ul>
    </li>
    <li><a routerLink="/useful" routerLinkActive="active-link" (click)="closeMenu()">Полезное</a></li>
    <li><a routerLink="/contacts" routerLinkActive="active-link" (click)="closeMenu()">Контакты</a></li>
  </ul>
</nav>

<nav class="mobile-bottom-nav" aria-label="Мобильная навигация">
  <a
    routerLink="/"
    routerLinkActive="active-link"
    [routerLinkActiveOptions]="{ exact: true }"
    class="mobile-bottom-nav__item"
  >
    <span class="mobile-bottom-nav__icon" aria-hidden="true">⌂</span>
    <span class="mobile-bottom-nav__label">Главная</span>
  </a>
  <a routerLink="/price" routerLinkActive="active-link" class="mobile-bottom-nav__item">
    <span class="mobile-bottom-nav__icon" aria-hidden="true">₽</span>
    <span class="mobile-bottom-nav__label">Прайс</span>
  </a>
  <a routerLink="/services" routerLinkActive="active-link" class="mobile-bottom-nav__item">
    <span class="mobile-bottom-nav__icon" aria-hidden="true">⚙</span>
    <span class="mobile-bottom-nav__label">Прайс услуги</span>
  </a>
  <a routerLink="/useful" routerLinkActive="active-link" class="mobile-bottom-nav__item">
    <span class="mobile-bottom-nav__icon" aria-hidden="true">?</span>
    <span class="mobile-bottom-nav__label">Полезное</span>
  </a>
  <a routerLink="/contacts" routerLinkActive="active-link" class="mobile-bottom-nav__item">
    <span class="mobile-bottom-nav__icon" aria-hidden="true">☎</span>
    <span class="mobile-bottom-nav__label">Контакты</span>
  </a>
</nav>
