<h2>Прайс-лист</h2>

<div *ngIf="isLoading">Загрузка данных...</div>
<div *ngIf="error" style="color: red;">{{ error }}</div>

<table *ngIf="!isLoading && brands.length > 0" border="1" cellpadding="10" width="100%">
  <thead>
    <tr>
      <th>Марка</th>
      <th>Цена (руб.)</th>
    </tr>
  </thead>
  <tbody>
    <!-- Итерация по всему объединенному списку -->
    <ng-container *ngFor="let brandItem of brands; let i = index">
      
      <!-- Визуальный разделитель/Заголовок категории -->
      <!-- Этот блок ngIf вставляет строку заголовка только когда меняется тип продукта -->
      <tr *ngIf="i === 0 || brands[i-1].type !== brandItem.type">
        <!-- Ячейка, растянутая на всю ширину таблицы (2 столбца) -->
        <td colspan="2" style="background-color: #f2f2f2; font-weight: bold; padding: 10px;">
            {{ brandItem.type }}
        </td>
      </tr>

      <!-- Основная строка с данными (марка и цена) -->
      <tr>
        <td>{{ brandItem.brand }}</td>
        <td>{{ brandItem.price }} руб.</td>
      </tr>

    </ng-container>
  </tbody>
</table>

<div *ngIf="!isLoading && brands.length === 0">
  Данных пока нет.
</div>
