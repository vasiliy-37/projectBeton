<header>
    <div class="logo">
        <div class="logo-brand-row">
            <img class="logo-mixer" src="/assets/logo-mixer.png" alt="" width="56" height="56" aria-hidden="true">
            <div class="logo-text">
                <div class="logo-main" aria-label="Бетон">
                    <span class="logo-char logo-char--accent">Б</span><span class="logo-char logo-char--accent">Е</span><span class="logo-char logo-char--accent">Т</span><span class="logo-char logo-char--dark">О</span><span class="logo-char logo-char--dark">Н</span>
                </div>
                <div class="logo-subtitle">с доставкой в Иваново</div>
            </div>
        </div>
    </div>

    <div class="contact-info-container">
    <div class="contact-info">
       <app-phone-display></app-phone-display>
    </div>

    <div class="navigation-mobile-wrapper">
        <app-navigation-bar></app-navigation-bar>
        </div>
    </div>
    
    <div class="actions">
        <!-- Кнопка перехода к калькулятору на главной странице -->
        <a routerLink="/" class="btn-calculator" routerLinkActive="active-btn"
            [routerLinkActiveOptions]="{exact: true}">
            Сделать расчёт
            <span></span>
        </a>
    </div>
</header>
