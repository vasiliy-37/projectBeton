<h2>Наши услуги</h2>

<div *ngIf="isLoading">Загрузка данных...</div>
<div *ngIf="error" style="color: red;">{{ error }}</div>

<ng-container *ngIf="!isLoading && services.length > 0">
  <ng-container *ngFor="let group of getGroupedServices()">
    <h3 class="service-group-title">{{ group.category }}</h3>
    <p class="service-group-subtitle" *ngIf="group.subtitle">{{ group.subtitle }}</p>
    <table class="table" cellpadding="10" width="100%">
      <thead>
        <tr>
          <th>Услуга</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let service of group.items">
          <td>{{ service.name }}</td>
          <td>{{ service.price }} {{ service.unit }}</td>
        </tr>
      </tbody>
    </table>
  </ng-container>
  <p class="service-price-note">ОКОНЧАТЕЛЬНАЯ ЦЕНА ОБСУЖДАЕТСЯ В КАЖДОМ КОНКРЕТНОМ СЛУЧАЕ</p>
</ng-container>
