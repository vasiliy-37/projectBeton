<h2>Наши услуги</h2>

<div *ngIf="isLoading">Загрузка данных...</div>
<div *ngIf="error" style="color: red;">{{ error }}</div>

<table *ngIf="!isLoading && services.length > 0" class="table" cellpadding="10" width="100%">
  <thead>
    <tr>
      <th>Услуга</th>
      <!-- Заголовок столбца теперь просто "Цена" -->
      <th>Цена</th> 
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let service of services">
      <td>{{ service.name }}</td>
      <!-- Объединяем цену и единицу измерения в одной ячейке -->
      <td>{{ service.price }} {{ service.unit }}</td> 
    </tr>
  </tbody>
</table>
