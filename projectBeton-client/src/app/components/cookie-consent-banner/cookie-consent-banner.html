@if (visible()) {
  <div class="cookie-banner" role="dialog" aria-labelledby="cookie-banner-title" aria-modal="false">
    <div class="cookie-banner__inner">
      <div class="cookie-banner__text">
        <h2 id="cookie-banner-title" class="cookie-banner__title">Файлы cookie и аналитика</h2>
        <p class="cookie-banner__lead">
          Необходимые cookie нужны для работы сайта. По вашему согласию мы также подключаем Яндекс.Метрику и
          Google Tag Manager для статистики посещений. Подробнее — в
          <a [routerLink]="['/privacy']" fragment="cookies">политике конфиденциальности</a>.
        </p>
      </div>
      <div class="cookie-banner__actions">
        <button type="button" class="cookie-banner__btn cookie-banner__btn--ghost" (click)="acceptNecessary()">
          Только необходимые
        </button>
        <button type="button" class="cookie-banner__btn cookie-banner__btn--primary" (click)="acceptAnalytics()">
          Разрешить аналитику
        </button>
      </div>
    </div>
  </div>
}
